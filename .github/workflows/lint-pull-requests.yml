name: Lint Pull Requests
on:
  pull_request:
    paths:
      - '**/*.cs'

permissions:
  contents: read
  pull-requests: write

jobs:
  format-suggest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Get changed .cs files
        id: changed-files
        uses: tj-actions/changed-files@v45
        with:
          files: |
            **/*.cs

      - name: Group changed files by top-level folder and format
        if: steps.changed-files.outputs.any_changed == 'true'
        shell: bash
        run: |
          declare -A proj_files

          for f in ${{ steps.changed-files.outputs.all_changed_files }}; do
            top_dir="${f%%/*}"          # first path segment, e.g. "WolvenKit.RED4"
            rel_path="${f#*/}"          # rest of path relative to that folder

            csproj=$(find "$top_dir" -maxdepth 1 -name "*.csproj" | head -n1)
            if [ -z "$csproj" ]; then
              echo "::warning file=$f::No .csproj found in $top_dir, skipping"
              continue
            fi

            if [ -z "${proj_files[$csproj]}" ]; then
              proj_files[$csproj]="$rel_path"
            else
              proj_files[$csproj]="${proj_files[$csproj]};$rel_path"
            fi
          done

          for csproj in "${!proj_files[@]}"; do
            echo "Formatting $csproj -> ${proj_files[$csproj]}"
            dotnet format style "$csproj" \
              --include "${proj_files[$csproj]}" \
              --severity info \
              -v diagnostic
          done

      - name: Suggest changes
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: reviewdog/action-suggester@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tool_name: dotnet-format
          fail_level: none
          filter_mode: diff_context
